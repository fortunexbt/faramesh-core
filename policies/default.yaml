# Faramesh Policy Language (FPL) v1.0
# Default policy — safe starting point for most deployments.
#
# Rules are evaluated in document order; first match wins.
# Conditions use expr-lang. Available variables:
#   args.*          tool call arguments
#   session.calls   number of calls in this session
#   tool.reversibility / tool.blast_radius / tool.tags
#
# Validate:  faramesh policy validate policies/default.yaml
# Dry-run:   faramesh policy test policies/default.yaml --tool http/get

faramesh-version: "1.0"
agent-id: "default"

tools:
  http/get:
    reversibility: reversible
    blast_radius: low
  http/post:
    reversibility: reversible
    blast_radius: medium
  shell/exec:
    reversibility: irreversible
    blast_radius: high
  stripe/refund:
    reversibility: irreversible
    blast_radius: high
    tags: [financial]

budget:
  max_calls: 500
  daily_usd: 10.00
  on_exceed: deny

rules:
  # Allow safe read-only HTTP requests.
  - id: allow-http-get
    match:
      tool: "http/get"
    effect: permit
    reason: "Safe read-only HTTP GET"

  # Require human approval for any shell execution.
  - id: defer-shell-exec
    match:
      tool: "shell/*"
    effect: defer
    reason: "Shell commands require human approval"
    reason_code: RULE_DEFER_SHELL
    incident_category: execution
    incident_severity: high

  # Require human approval for high-value financial operations.
  - id: defer-stripe-high-value
    match:
      tool: "stripe/refund"
      when: "args.amount > 500"
    effect: defer
    reason: "Refund over $500 requires human approval"
    reason_code: RULE_DEFER_HIGH_VALUE

  # Allow routine Stripe refunds under $500.
  - id: allow-stripe-small-refund
    match:
      tool: "stripe/refund"
      when: "args.amount <= 500"
    effect: permit
    reason: "Routine refund under $500"

  # Deny all other actions (default deny).
  - id: default-deny
    match:
      tool: "*"
    effect: deny
    reason: "No matching rule — default deny"
    reason_code: DEFAULT_DENY

default_effect: deny
