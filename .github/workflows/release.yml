name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ─── Build cross-compiled Go binaries ───────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.suffix }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build \
            -trimpath \
            -ldflags="-X main.version=${{ steps.version.outputs.version }} -s -w" \
            -o faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            ./cmd/faramesh

      - name: Generate checksum
        run: |
          sha256sum faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            > faramesh-${{ matrix.suffix }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: faramesh-${{ matrix.suffix }}
          path: |
            faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }}
            faramesh-${{ matrix.suffix }}.sha256
          retention-days: 1

  # ─── Docker image ────────────────────────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/faramesh/faramesh:${{ steps.version.outputs.tag }}
            ghcr.io/faramesh/faramesh:latest
            faramesh/faramesh:${{ steps.version.outputs.tag }}
            faramesh/faramesh:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  # ─── GitHub Release with binaries ────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release body
        run: |
          cat > release_notes.md << 'EOF'
          ## faramesh v${{ steps.version.outputs.version }}

          ### Install

          **macOS / Linux:**
          ```bash
          curl -fsSL https://faramesh.dev/install.sh | sh
          ```

          **Direct download:**
          | Platform | Binary |
          |---|---|
          | Linux amd64 | `faramesh-linux-amd64` |
          | Linux arm64 | `faramesh-linux-arm64` |
          | macOS amd64 | `faramesh-darwin-amd64` |
          | macOS arm64 (Apple Silicon) | `faramesh-darwin-arm64` |
          | Windows amd64 | `faramesh-windows-amd64.exe` |

          **Python SDK:**
          ```bash
          pip install faramesh==${{ steps.version.outputs.version }}
          ```

          **Docker:**
          ```bash
          docker run --rm ghcr.io/faramesh/faramesh:v${{ steps.version.outputs.version }} demo
          ```

          ### Quick start
          ```bash
          faramesh demo
          faramesh init
          faramesh serve --policy policy.yaml
          ```

          ### Verify checksums
          ```bash
          sha256sum -c faramesh-linux-amd64.sha256
          ```
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: faramesh v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: artifacts/*
          generate_release_notes: true

  # ─── Python SDK to PyPI ──────────────────────────────────────────────────────
  publish-python-sdk:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    environment:
      name: pypi
      url: https://pypi.org/p/faramesh
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set SDK version
        working-directory: sdk/python
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.version }}"/' pyproject.toml

      - name: Build SDK wheel
        working-directory: sdk/python
        run: |
          pip install hatchling build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          print-hash: true
        continue-on-error: true
