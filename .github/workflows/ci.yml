name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: matrix.go == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-X main.version=ci-${GITHUB_SHA::8} -s -w" \
            -o faramesh ./cmd/faramesh
      - name: Verify version
        run: ./faramesh version
      - name: Validate FPL examples
        run: |
          for f in examples/*.fpl; do
            echo "Validating $f..."
            ./faramesh policy validate "$f"
          done
      - name: Run demo (smoke test)
        run: ./faramesh demo

  cross-compile:
    name: Cross-compile (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-X main.version=ci-${GITHUB_SHA::8} -s -w" \
            -o faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            ./cmd/faramesh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faramesh-${{ matrix.suffix }}
          path: faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }}
          retention-days: 14

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: faramesh/faramesh:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
