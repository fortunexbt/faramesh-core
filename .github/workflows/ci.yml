name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-X main.version=ci-${GITHUB_SHA::8}" \
            -o faramesh ./cmd/faramesh
          ./faramesh --version

      - name: Validate demo policy
        run: ./faramesh policy validate policies/demo.yaml

      - name: Run demo (smoke test)
        run: ./faramesh demo

  cross-compile:
    name: Cross-compile release binaries
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build ${{ matrix.suffix }}
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-X main.version=ci-${GITHUB_SHA::8} -s -w" \
            -o faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            ./cmd/faramesh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faramesh-${{ matrix.suffix }}
          path: faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }}
          retention-days: 7

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: faramesh/faramesh:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
